version: "3.9"

services:

  backend:
    build: ./backend

    container_name: rag-backend

    ports:
      - "8000:8000"

    volumes:
      - ./vectorstore:/vectorstore
      - ./data:/data

  frontend:
    build: ./frontend

    container_name: rag-frontend

    ports:
      - "8501:8501"

    depends_on:
      - backend